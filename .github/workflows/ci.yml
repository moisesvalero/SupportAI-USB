name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore SupportAI.slnx

      - name: Build
        run: dotnet build SupportAI.slnx -c Release --no-restore

      - name: Test
        run: dotnet test SupportAI.slnx -c Release --no-build --nologo

      - name: Publish CLI
        run: |
          dotnet publish src\SupportAI.Cli\SupportAI.Cli.csproj -c Release -o publish\cli --no-build

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: supportai-cli
          path: publish\cli

      - name: Publish WPF
        run: |
          dotnet publish src\SupportAI.App.Wpf\SupportAI.App.Wpf.csproj -c Release -o publish\wpf --no-build

      - name: Upload WPF artifact
        uses: actions/upload-artifact@v4
        with:
          name: supportai-wpf
          path: publish\wpf
